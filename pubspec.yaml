name: btshortstay
description: "A shortStay apartments booking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  mailer: ^6.0.1
  url_launcher: ^6.3.0
  cloud_functions: ^6.0.0
  http: ^1.2.0
  pdf: ^3.11.0
  printing: ^5.13.1
  table_calendar: ^3.0.9
  file_picker: ^10.3.2
  path_provider: ^2.1.3
  open_filex: ^4.5.0
  fl_chart: ^0.68.0
  responsive_framework: ^1.5.1
  shared_preferences: ^2.2.2
  firebase_functions: ^0.0.1-dev
  google_fonts: ^5.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  js: ^0.7.2
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - web/icons/
    - assets/images/btslogo.png
    - assets/images/splash.png
    - assets/icon/appicon.png   # ✅ Added your actual icon here

# ------------------------------------------------------------
# APP ICON CONFIGURATION
# ------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/appicon.png"
  
  # Optional: Adaptive icon (for Android 8+)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/appicon.png"

  # Web icon (optional)
  web:
    generate: true
    image_path: "assets/icon/appicon.png"
    background_color: "#FFFFFF"
    theme_color: "#2196F3"

# ------------------------------------------------------------
# SPLASH SCREEN CONFIGURATION
# ------------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png

  # Android 12+
  android_12:
    image: assets/images/splash.png
    color: "#FFFFFF"

  ios: true
  web: true
